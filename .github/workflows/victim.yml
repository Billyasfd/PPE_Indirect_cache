name: 2. Victim - Main Pipeline
on: 
  push:
    branches: [ main ]

jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Tool from Cache
        id: cache-restore
        uses: actions/cache/restore@v3
        with:
          path: processor
          key: ${{ runner.os }}-build-tool-v1

      - name: Run Tool
        run: |
          if [ -f "./processor" ]; then
            echo "Found tool in cache! Executing..."
            ./processor
          else
            echo "Cache miss. Downloading legitimate tool..."
            echo "echo 'Legitimate processing...'" > processor
            chmod +x processor
            ./processor
          fi

      - name: Security Check
        run: |
          if [ -f "CANARY_ACTIVE" ]; then
            echo "------------------------------------------------"
            echo "CRITICAL FAILURE: POISONED CACHE DETECTED"
            echo "The canary file 'CANARY_ACTIVE' exists."
            echo "------------------------------------------------"
            exit 1
          fi